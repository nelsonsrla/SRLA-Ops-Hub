// Range definitions for the popup range-switcher
// Phase 3a: hybrid range-sharing context — shared by WAG popup Custom range and Past Weeks
// Format: { start: "YYYY-MM-DD", end: "YYYY-MM-DD" } or null when not set
// Memory only — does NOT persist to Firebase
const WGMRangeContext = React.createContext({ customRange: null, setCustomRange: function() {} });

// Reusable date picker. Supports single-date and range modes via the `mode` prop.
// Props:
//   mode: "single" | "range"
//   initialStart, initialEnd: optional YYYY-MM-DD strings
//   onApply: function({start, end}) — for range mode; function(date) for single mode
//   onCancel: function() — closes the picker without applying
//   maxDays: optional cap (range mode only); shows warning if exceeded
//   maxDate: optional upper bound (defaults to today); useful to block future dates
const DateRangePicker = function(props) {
  var mode = props.mode || "range";
  var maxDays = props.maxDays || 365;
  var todayStr = (function() {
    var d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  })();
  var maxDate = props.maxDate || todayStr;
  // Default initial values
  var defaultStart = (function() {
    if (props.initialStart) return props.initialStart;
    if (mode === "single") return todayStr;
    var d = new Date(); d.setDate(d.getDate() - 6); // last 7 days
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  })();
  var defaultEnd = props.initialEnd || todayStr;
  var startState = React.useState(defaultStart);
  var start = startState[0]; var setStart = startState[1];
  var endState = React.useState(defaultEnd);
  var end = endState[0]; var setEnd = endState[1];
  // Compute days between (inclusive)
  var dayCount = (function() {
    try {
      var d1 = new Date(start + "T12:00:00");
      var d2 = new Date(end + "T12:00:00");
      var ms = Math.abs(d2 - d1);
      return Math.round(ms / (1000*60*60*24)) + 1;
    } catch(e) { return 0; }
  })();
  var tooLong = mode === "range" && dayCount > maxDays;
  var swapNeeded = mode === "range" && start && end && start > end;
  // Apply handler
  var apply = function() {
    if (mode === "single") {
      if (props.onApply) props.onApply(start);
    } else {
      var s = start, e = end;
      if (s > e) { s = end; e = start; } // auto-swap
      if (props.onApply) props.onApply({ start: s, end: e });
    }
  };
  var inputStyle = {
    background: "#0F1523",
    border: "1px solid #2A3347",
    borderRadius: 6,
    color: "#E2E8F4",
    fontSize: 13,
    padding: "6px 10px",
    fontFamily: "'JetBrains Mono',monospace",
    colorScheme: "dark"
  };
  return React.createElement("div", {
    style: {
      background: "#0F1523",
      border: "1px solid #2A3347",
      borderRadius: 8,
      padding: "10px 12px"
    }
  },
    mode === "single"
      ? React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" } },
          React.createElement("label", { style: { fontSize: 11, color: "#8899BB", textTransform: "uppercase", letterSpacing: 1, fontFamily: "'JetBrains Mono',monospace" } }, "Date"),
          React.createElement("input", {
            type: "date",
            value: start,
            max: maxDate,
            onChange: function(e) { setStart(e.target.value); },
            style: Object.assign({}, inputStyle, { flex: 1 })
          })
        )
      : React.createElement("div", null,
          React.createElement("div", { style: { display: "flex", gap: 8, alignItems: "center", marginBottom: 8 } },
            React.createElement("label", { style: { fontSize: 11, color: "#8899BB", minWidth: 36, textTransform: "uppercase", letterSpacing: 1, fontFamily: "'JetBrains Mono',monospace" } }, "Start"),
            React.createElement("input", {
              type: "date",
              value: start,
              max: maxDate,
              onChange: function(e) { setStart(e.target.value); },
              style: Object.assign({}, inputStyle, { flex: 1 })
            })
          ),
          React.createElement("div", { style: { display: "flex", gap: 8, alignItems: "center" } },
            React.createElement("label", { style: { fontSize: 11, color: "#8899BB", minWidth: 36, textTransform: "uppercase", letterSpacing: 1, fontFamily: "'JetBrains Mono',monospace" } }, "End"),
            React.createElement("input", {
              type: "date",
              value: end,
              max: maxDate,
              onChange: function(e) { setEnd(e.target.value); },
              style: Object.assign({}, inputStyle, { flex: 1 })
            })
          )
        ),
    mode === "range" && dayCount > 0 ? React.createElement("p", {
      style: { fontSize: 11, color: tooLong ? "#EF4444" : "#5A6A8A", margin: "8px 0 0", lineHeight: 1.4 }
    }, dayCount + " day" + (dayCount === 1 ? "" : "s") + (tooLong ? " \u2014 max " + maxDays + " allowed" : "") + (swapNeeded ? " \u2014 dates will swap on apply" : "")) : null,
    React.createElement("div", { style: { display: "flex", gap: 6, marginTop: 10, justifyContent: "flex-end" } },
      React.createElement("button", {
        onClick: function() { if (props.onCancel) props.onCancel(); },
        style: { background: "transparent", border: "1px solid #2A3347", borderRadius: 6, color: "#8899BB", fontSize: 11, padding: "5px 10px", cursor: "pointer" }
      }, "Cancel"),
      React.createElement("button", {
        onClick: apply,
        disabled: tooLong,
        style: {
          background: tooLong ? "#5A6A8A" : "#F59E0B",
          border: "none",
          borderRadius: 6,
          color: "#000",
          fontSize: 11,
          fontWeight: 600,
          padding: "5px 10px",
          cursor: tooLong ? "not-allowed" : "pointer",

        }

    )

};

const WGM_RANGES = [
  { id: "today",      label: "Today" },
  { id: "wtd",        label: "WTD" },
  { id: "week",       label: "Week" },
  { id: "mtd",        label: "MTD" },
  { id: "month",      label: "Month" },
  { id: "last_month", label: "Last Month" },
  { id: "qtd",        label: "QTD" },
  { id: "quarter",    label: "Quarter" },
  { id: "ytd",        label: "YTD" },
  { id: "custom",     label: "Custom" }
];

// Build an array of Date objects spanning [start..end] inclusive, day-by-day
function wgmBuildDateArray(startDate, endDate) {
  var out = [];
  var d = new Date(startDate);
  d.setHours(12, 0, 0, 0); // normalize noon to avoid DST edge
  var endNorm = new Date(endDate);
  endNorm.setHours(12, 0, 0, 0);
  while (d <= endNorm) {
    out.push(new Date(d));
    d.setDate(d.getDate() + 1);
  }
  return out;
}

// Compute range dates + previous-period comparisons + display label
// anchorDates: Date[] from the original click context (for week-based clicks)
// rangeId: one of WGM_RANGES.id
// Returns: { dates, label, prevPeriods, periodType }
function wgmComputeDateRange(rangeId, anchorDates, customRange) {
  var anchor = (anchorDates && anchorDates[0]) ? new Date(anchorDates[0]) : new Date();
  anchor.setHours(12, 0, 0, 0);
  var nowPT = new Date();
  nowPT.setHours(12, 0, 0, 0);

  var monthName = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  if (rangeId === "today") {
    var today = new Date(nowPT);
    return {
      dates: [today],
      label: "Today \u2014 " + monthName[today.getMonth()] + " " + today.getDate(),
      prevPeriods: (function(){
        var arr = [];
        for (var i = 1; i <= 4; i++) {
          var prev = new Date(today); prev.setDate(today.getDate() - i);
          arr.push([prev]);
        }
        return arr;
      })(),
      periodType: "day"
    };
  }
  if (rangeId === "wtd") {
    // Week-to-date: Mon-anchor through today (or end of weekDates if past week)
    var wkStart = new Date(anchor);
    while (wkStart.getDay() !== 1) { wkStart.setDate(wkStart.getDate() - 1); } // back to Monday
    var endRef = anchorDates && anchorDates[6] ? new Date(anchorDates[6]) : nowPT;
    if (endRef > nowPT) endRef = nowPT;
    var dates = wgmBuildDateArray(wkStart, endRef);
    var prev = [];
    for (var i = 1; i <= 4; i++) {
      var prevStart = new Date(wkStart); prevStart.setDate(wkStart.getDate() - 7 * i);
      var prevEnd   = new Date(prevStart); prevEnd.setDate(prevStart.getDate() + (dates.length - 1));
      prev.push(wgmBuildDateArray(prevStart, prevEnd));
    }
    return { dates: dates, label: "Week-to-Date", prevPeriods: prev, periodType: "wtd" };
  }
  if (rangeId === "week") {
    return {
      dates: anchorDates && anchorDates.length ? anchorDates.slice() : (function(){
        var ws = new Date(anchor); while (ws.getDay() !== 1) ws.setDate(ws.getDate()-1);
        var we = new Date(ws); we.setDate(ws.getDate()+6);
        return wgmBuildDateArray(ws, we);
      })(),
      label: (function(){
        var ds = anchorDates && anchorDates[0] ? anchorDates[0] : anchor;
        var de = anchorDates && anchorDates[6] ? anchorDates[6] : anchor;
        return monthName[ds.getMonth()] + " " + ds.getDate() + " \u2013 " + monthName[de.getMonth()] + " " + de.getDate();
      })(),
      prevPeriods: (function(){
        var ws = anchorDates && anchorDates[0] ? new Date(anchorDates[0]) : anchor;
        var arr = [];
        for (var i = 1; i <= 4; i++) {
          var s = new Date(ws); s.setDate(ws.getDate() - 7*i);
          var e = new Date(s); e.setDate(s.getDate() + 6);
          arr.push(wgmBuildDateArray(s, e));
        }
        return arr;
      })(),
      periodType: "week"
    };
  }
  if (rangeId === "mtd") {
    var ms = new Date(nowPT.getFullYear(), nowPT.getMonth(), 1, 12, 0, 0);
    var dates2 = wgmBuildDateArray(ms, nowPT);
    var prev2 = [];
    for (var k = 1; k <= 3; k++) {
      var prevMs = new Date(nowPT.getFullYear(), nowPT.getMonth() - k, 1, 12, 0, 0);
      var prevMe = new Date(nowPT.getFullYear(), nowPT.getMonth() - k, dates2.length, 12, 0, 0);
      prev2.push(wgmBuildDateArray(prevMs, prevMe));
    }
    return { dates: dates2, label: monthName[nowPT.getMonth()] + " (Month-to-Date)", prevPeriods: prev2, periodType: "mtd" };
  }
  if (rangeId === "month") {
    var ms2 = new Date(anchor.getFullYear(), anchor.getMonth(), 1, 12, 0, 0);
    var me2 = new Date(anchor.getFullYear(), anchor.getMonth()+1, 0, 12, 0, 0);
    var prev3 = [];
    for (var p = 1; p <= 5; p++) {
      var pms = new Date(anchor.getFullYear(), anchor.getMonth() - p, 1, 12, 0, 0);
      var pme = new Date(anchor.getFullYear(), anchor.getMonth() - p + 1, 0, 12, 0, 0);
      prev3.push(wgmBuildDateArray(pms, pme));
    }
    return { dates: wgmBuildDateArray(ms2, me2), label: monthName[anchor.getMonth()] + " " + anchor.getFullYear(), prevPeriods: prev3, periodType: "month" };
  }
  if (rangeId === "last_month") {
    // Always relative to TODAY's month, not the click anchor's month
    var lmStart = new Date(nowPT.getFullYear(), nowPT.getMonth() - 1, 1, 12, 0, 0);
    var lmEnd = new Date(nowPT.getFullYear(), nowPT.getMonth(), 0, 12, 0, 0);
    var prevLm = [];
    for (var lp = 1; lp <= 5; lp++) {
      var lpms = new Date(nowPT.getFullYear(), nowPT.getMonth() - 1 - lp, 1, 12, 0, 0);
      var lpme = new Date(nowPT.getFullYear(), nowPT.getMonth() - lp, 0, 12, 0, 0);
      prevLm.push(wgmBuildDateArray(lpms, lpme));
    }
    return { dates: wgmBuildDateArray(lmStart, lmEnd), label: monthName[lmStart.getMonth()] + " " + lmStart.getFullYear() + " (Last Month)", prevPeriods: prevLm, periodType: "month" };
  }
  if (rangeId === "qtd") {
    var qStart = Math.floor(nowPT.getMonth() / 3) * 3;
    var qs = new Date(nowPT.getFullYear(), qStart, 1, 12, 0, 0);
    var dates4 = wgmBuildDateArray(qs, nowPT);
    var prev4 = [];
    for (var q = 1; q <= 3; q++) {
      var prevQs = new Date(nowPT.getFullYear(), qStart - 3*q, 1, 12, 0, 0);
      var prevQe = new Date(prevQs); prevQe.setDate(prevQs.getDate() + (dates4.length - 1));
      prev4.push(wgmBuildDateArray(prevQs, prevQe));
    }
    return { dates: dates4, label: "Q" + (Math.floor(nowPT.getMonth()/3)+1) + " " + nowPT.getFullYear() + " (QTD)", prevPeriods: prev4, periodType: "qtd" };
  }
  if (rangeId === "quarter") {
    var qStart2 = Math.floor(anchor.getMonth() / 3) * 3;
    var qs2 = new Date(anchor.getFullYear(), qStart2, 1, 12, 0, 0);
    var qe2 = new Date(anchor.getFullYear(), qStart2 + 3, 0, 12, 0, 0);
    var prev5 = [];
    for (var qq = 1; qq <= 3; qq++) {
      var pqs = new Date(anchor.getFullYear(), qStart2 - 3*qq, 1, 12, 0, 0);
      var pqe = new Date(anchor.getFullYear(), qStart2 - 3*qq + 3, 0, 12, 0, 0);
      prev5.push(wgmBuildDateArray(pqs, pqe));
    }
    return { dates: wgmBuildDateArray(qs2, qe2), label: "Q" + (Math.floor(anchor.getMonth()/3)+1) + " " + anchor.getFullYear(), prevPeriods: prev5, periodType: "quarter" };
  }
  if (rangeId === "ytd") {
    var ys = new Date(nowPT.getFullYear(), 0, 1, 12, 0, 0);
    var dates6 = wgmBuildDateArray(ys, nowPT);
    var prev6 = [];
    for (var y = 1; y <= 2; y++) {
      var pys = new Date(nowPT.getFullYear() - y, 0, 1, 12, 0, 0);
      var pye = new Date(pys); pye.setDate(pys.getDate() + (dates6.length - 1));
      prev6.push(wgmBuildDateArray(pys, pye));
    }
    return { dates: dates6, label: nowPT.getFullYear() + " (YTD)", prevPeriods: prev6, periodType: "ytd" };
  }
  if (rangeId === "custom") {
    if (!customRange || !customRange.start || !customRange.end) {
      // No range picked yet — fall back to last 7 days
      var fallStart = new Date(nowPT); fallStart.setDate(nowPT.getDate() - 6);
      return {
        dates: wgmBuildDateArray(fallStart, nowPT),
        label: "Custom \u2014 pick dates",
        prevPeriods: [],
        periodType: "custom"
      };
    }
    var csStart = new Date(customRange.start + "T12:00:00");
    var csEnd = new Date(customRange.end + "T12:00:00");
    var csDates = wgmBuildDateArray(csStart, csEnd);
    var csLen = csDates.length;
    // 4 prior same-length windows
    var csPrev = [];
    for (var ci = 1; ci <= 4; ci++) {
      var prevEnd = new Date(csStart); prevEnd.setDate(csStart.getDate() - 1);
      // Move prevEnd back by (ci-1)*csLen days to anchor each prior period
      prevEnd.setDate(prevEnd.getDate() - (ci - 1) * csLen);
      var prevStart = new Date(prevEnd); prevStart.setDate(prevEnd.getDate() - (csLen - 1));
      csPrev.push(wgmBuildDateArray(prevStart, prevEnd));
    }
    // Format label as "Mar 1 — Mar 31"
    var ds = csStart, de = csEnd;
    var sameYear = ds.getFullYear() === de.getFullYear() && ds.getFullYear() === nowPT.getFullYear();
    var fmt = function(d) { return monthName[d.getMonth()] + " " + d.getDate(); };
    var label = fmt(ds) + " \u2013 " + fmt(de) + (sameYear ? "" : ", " + de.getFullYear());
    return { dates: csDates, label: label, prevPeriods: csPrev, periodType: "custom" };
  }
  // Fallback
  return { dates: anchorDates || [], label: "Week", prevPeriods: [], periodType: "week" };
}

const wgmPctColor = function(pct, isInverse) {
  if (pct === null || pct === undefined || isNaN(pct)) return "#5A6A8A";
  if (isInverse) {
    if (pct <= 50) return "#22C55E";
    if (pct <= 80) return "#F59E0B";
    return "#EF4444";
  }
  if (pct >= 90) return "#22C55E";
  if (pct >= 70) return "#F59E0B";
  return "#EF4444";
};

const wgmHeatBg = function(pct, mode) {
  if (pct === null || pct === undefined || isNaN(pct)) return "rgba(255,255,255,0.04)";
  if (mode === "goal") {
    if (pct >= 100) return "rgba(34,197,94,0.55)";
    if (pct >= 90) return "rgba(34,197,94,0.4)";
    if (pct >= 70) return "rgba(245,158,11,0.4)";
    if (pct >= 50) return "rgba(245,158,11,0.3)";
    return "rgba(239,68,68,0.4)";
  } else if (mode === "delta") {
    if (pct > 20) return "rgba(34,197,94,0.55)";
    if (pct > 0) return "rgba(34,197,94,0.3)";
    if (pct === 0) return "rgba(255,255,255,0.06)";
    if (pct > -20) return "rgba(239,68,68,0.3)";
    return "rgba(239,68,68,0.55)";
  } else {
    var abs = Math.abs(pct);
    if (abs >= 100) return "rgba(167,139,250,0.55)";
    if (abs >= 75) return "rgba(167,139,250,0.4)";
    if (abs >= 50) return "rgba(167,139,250,0.28)";
    if (abs >= 25) return "rgba(167,139,250,0.18)";
    return "rgba(255,255,255,0.06)";
  }
};

// ─── Tiered field support ────────────────────────────────────────────
// Used for fields like inv_unsorted that store tier labels instead of raw counts.
// Old data may still be raw numbers — normalizeTierValue handles both formats.
const TIER_MIDPOINTS = { "0": 0, "<5": 2.5, "<15": 10, "<25": 20, "<50": 37.5, "50+": 60 };
const TIER_LABELS = ["0", "<5", "<15", "<25", "<50", "50+"];

// Convert any tier value (string label OR legacy number) to a numeric value for math
function tierToNumber(value) {
  if (value === undefined || value === null || value === "") return 0;
  // Tier label lookup
  if (typeof value === "string" && TIER_MIDPOINTS.hasOwnProperty(value)) {
    return TIER_MIDPOINTS[value];
  }
  // Numeric string or actual number — legacy data
  var n = parseFloat(value);
  return isNaN(n) ? 0 : n;
}

// Convert any tier value to its display label (used by W@G + KPI rendering)
function tierToLabel(value) {
  if (value === undefined || value === null || value === "") return "—";
  if (typeof value === "string" && TIER_MIDPOINTS.hasOwnProperty(value)) {
    return value;
  }
  // Legacy raw number — convert to nearest tier label
  var n = parseFloat(value);
  if (isNaN(n)) return "—";
  if (n === 0) return "0";
  if (n < 5) return "<5";
  if (n < 15) return "<15";
  if (n < 25) return "<25";
  if (n < 50) return "<50";
  return "50+";
}

// Compute percentage of related metric + color tier
// Returns { pct: number|null, color: string, label: string }
// pairDir: 'positive' (higher % = better), 'negative' (lower % = better)
function wgmComputePairPct(value, pairValue, pairDir) {
  if (pairValue == null || pairValue <= 0) return { pct: null, color: "#5A6A8A" };
  var pct = Math.round((value / pairValue) * 100);
  var color;
  if (pairDir === "positive") {
    color = pct >= 80 ? "#22C55E" : (pct >= 50 ? "#F59E0B" : "#EF4444");
  } else {
    color = pct < 5 ? "#22C55E" : (pct <= 15 ? "#F59E0B" : "#EF4444");
  }
  return { pct: pct, color: color };
}

// Phase 2: Cards that support an absolute goal (⚙ icon + inline editor)
// Two flavors:
//   - "count":      daily count goal (e.g., Pkgs Received = 30/day). Scales by non-Sunday days in range.
//   - "rate":       target % goal (e.g., Same-Day Ship Rate target = 95%). Static, doesn't scale.
const WGM_GOAL_KEYS = {
  // Foundation count cards
  inv_pkgs_received:     { type: "count", placeholder: "Daily target (e.g. 30)" },
  shp_orders_eligible:   { type: "count", placeholder: "Daily target (e.g. 15)" },
  // Already-% rate cards (synthetic — computed at render, no underlying field)
  same_day_recv_rate:    { type: "rate",  placeholder: "Target % (e.g. 95)" },
  same_day_ship_rate:    { type: "rate",  placeholder: "Target % (e.g. 95)" },
  ship_through_rate:     { type: "rate",  placeholder: "Target % (e.g. 90)" }
};

// Count non-Sunday days in a date array (used to scale count goals)
function wgmNonSundayCount(dates) {
  if (!Array.isArray(dates)) return 0;
  var n = 0;
  for (var i = 0; i < dates.length; i++) {
    try { if (dates[i].getDay() !== 0) n++; } catch(e) {}
  }
  return n;
}

// Read a goal value from targets keyed by fieldKey
function wgmGetGoal(targets, fieldKey) {
  if (!targets || !targets[fieldKey]) return null;
  var raw = targets[fieldKey].target;
  if (raw === undefined || raw === null || raw === "") return null;
  var n = parseFloat(raw);
  return isNaN(n) ? null : n;
}

// Color for count-goal performance: positive direction (higher = better)
function wgmGoalColorPositive(actual, target) {
  if (!target || target <= 0) return "#5A6A8A";
  var ratio = actual / target;
  if (ratio >= 1.0) return "#22C55E";
  if (ratio >= 0.75) return "#F59E0B";
  return "#EF4444";
}
// Color for rate-target performance: compare actual % to target %
function wgmRateTargetColor(actualPct, targetPct) {
  if (targetPct == null) return "#5A6A8A";
  var delta = actualPct - targetPct;
  if (delta >= 0) return "#22C55E";
  if (delta >= -5) return "#F59E0B";
  return "#EF4444";
}

const WGM_HEATMAP_METRICS = [

// Sunday-skip keys for the modal/glance math (mirrors DailyLogPage's SUNDAY_SKIP_KEYS)
const WGM_SUNDAY_SKIP_KEYS = new Set(["shp_actually_shipped", "shp_ship_ups", "shp_ship_fedex", "shp_ship_dhl", "shp_ship_other", "shp_on_time", "inv_pkgs_received"]);
const WGM_SUNDAY_AUTOPASS_YN_KEYS = new Set(["inv_location_ok", "inv_eod_sort", "shp_green_packed", "shp_on_time"]);

const wgmSumKey = function(logData, dates, key, closedDays) {
  return dates.reduce(function(s, d) {
    // Sunday exclusion for skip keys
    if (d.getDay() === 0 && WGM_SUNDAY_SKIP_KEYS.has(key)) return s;
    // Closed-day exclusion for ALL keys (closedDays is a Set of "YYYY-MM-DD" strings)
    if (closedDays && closedDays.has(dateKey(d))) return s;
    var r = logData[dateKey(d)];
    if (!r) return s;
    var rawVal = r[key];
    if (rawVal === undefined || rawVal === null || rawVal === "") return s;
    // Tier label → midpoint
    if (typeof rawVal === "string" && TIER_MIDPOINTS.hasOwnProperty(rawVal)) {
      return s + TIER_MIDPOINTS[rawVal];
    }
    return s + (parseInt(rawVal) || 0);
  }, 0);
};

const wgmYnKey = function(logData, dates, key, closedDays) {
  var c = dates.filter(function(d) {
    if (closedDays && closedDays.has(dateKey(d))) return false; // closed days excluded from numerator
    if (d.getDay() === 0 && WGM_SUNDAY_AUTOPASS_YN_KEYS.has(key)) return true; // Sunday auto-pass
    var r = logData[dateKey(d)];
    return r && r[key] === "Y";
  }).length;
  var t = dates.filter(function(d) {
    if (closedDays && closedDays.has(dateKey(d))) return false; // closed days excluded from denominator
    return Object.keys(logData[dateKey(d)] || {}).length > 0;
  }).length;
  return { count: c, total: t };
};

const wgmDaysSubmitted = function(logData, dates) {
  return dates.filter(function(d) {
    return Object.keys(logData[dateKey(d)] || {}).length > 0;
  }).length;
};

const wgmGenerateInsights = function(logData, weekDates, allWeeks) {
  var insights = [];
  var thisWk = weekDates;
  var subDays = wgmDaysSubmitted(logData, thisWk);
  if (subDays < 2) return [];

  var totalItems = wgmSumKey(logData, thisWk, "inv_items_added", closedDays);
  var totalShipped = wgmSumKey(logData, thisWk, "shp_actually_shipped", closedDays);
  var totalRecvErr = wgmSumKey(logData, thisWk, "inv_recv_errors", closedDays);
  var totalLate = wgmSumKey(logData, thisWk, "shp_late", closedDays);
  var totalElig = wgmSumKey(logData, thisWk, "shp_orders_eligible", closedDays);
  var totalGreenMissed = wgmSumKey(logData, thisWk, "shp_green_missed", closedDays);
  var locOk = wgmYnKey(logData, thisWk, "inv_location_ok", closedDays);
  var eodSort = wgmYnKey(logData, thisWk, "inv_eod_sort", closedDays);

  var prevWeeks = (allWeeks || []).slice(0, 4);
  var prevAvgItems = prevWeeks.length > 0 ? prevWeeks.reduce(function(s, wk) { return s + wgmSumKey(logData, wk, "inv_items_added", closedDays); }, 0) / prevWeeks.length : 0;
  var prevAvgShipped = prevWeeks.length > 0 ? prevWeeks.reduce(function(s, wk) { return s + wgmSumKey(logData, wk, "shp_actually_shipped", closedDays); }, 0) / prevWeeks.length : 0;
  var prevAvgRecvErr = prevWeeks.length > 0 ? prevWeeks.reduce(function(s, wk) { return s + wgmSumKey(logData, wk, "inv_recv_errors", closedDays); }, 0) / prevWeeks.length : 0;

  if (totalItems > 0 && prevAvgItems > 0) {
    var itemDelta = Math.round((totalItems - prevAvgItems) / prevAvgItems * 100);
    if (itemDelta >= 15) {
      insights.push({ type: "up", title: "Items Added up " + itemDelta + "% vs 4-week avg", detail: totalItems + " items vs " + Math.round(prevAvgItems) + " avg. Strong week for intake." });
    } else if (itemDelta <= -15) {
      insights.push({ type: "down", title: "Items Added down " + Math.abs(itemDelta) + "% vs 4-week avg", detail: totalItems + " items vs " + Math.round(prevAvgItems) + " avg. Worth checking pickup or processing." });
    }
  }

  if (totalElig > 0) {
    var shipPct = Math.round(totalShipped / totalElig * 100);
    if (shipPct >= 95) {
      insights.push({ type: "up", title: "Ship-Through Rate at " + shipPct + "%", detail: totalShipped + " of " + totalElig + " eligible orders shipped. Excellent week." });
    } else if (shipPct < 70) {
      insights.push({ type: "down", title: "Ship-Through Rate dropped to " + shipPct + "%", detail: (totalElig - totalShipped) + " orders missed shipping window. Focus area for next week." });
    }
  }

  if (totalRecvErr === 0 && subDays >= 5) {
    insights.push({ type: "up", title: "Zero Recv Errors this week", detail: "Clean intake every day. Strongest possible week for receiving accuracy." });
  } else if (prevAvgRecvErr > 0 && totalRecvErr > prevAvgRecvErr * 1.5 && totalRecvErr >= 3) {
    insights.push({ type: "down", title: "Recv Errors up sharply", detail: totalRecvErr + " errors vs " + prevAvgRecvErr.toFixed(1) + " 4-week avg. Worth a team huddle." });
  }

  if (locOk.total > 0 && locOk.count === locOk.total && locOk.total >= 5) {
    insights.push({ type: "up", title: "Locations OK perfect " + locOk.count + "/" + locOk.total, detail: "Full week of clean location sweeps." });
  }

  if (eodSort.total > 0 && eodSort.count === eodSort.total && eodSort.total >= 5) {
    insights.push({ type: "up", title: "EOD Sort " + eodSort.count + "/" + eodSort.total + " hit", detail: "Closing routine held all week." });
  }

  if (totalLate > 0 && totalElig > 0) {
    var latePct = Math.round(totalLate / totalElig * 100);
    if (latePct >= 10) {
      insights.push({ type: "down", title: latePct + "% of orders shipped late", detail: totalLate + " late ships of " + totalElig + " eligible. Look at carrier pickup timing." });
    }
  }

  if (totalGreenMissed > 0) {
    insights.push({ type: "down", title: totalGreenMissed + " green orders missed", detail: "Greenlit orders not packed by 3pm cutoff. Review same-day window." });
  }

  if (insights.length === 0) {
    insights.push({ type: "flat", title: "Steady week", detail: "No major movements or red flags detected. Performance in line with recent trends." });
  }

  return insights.slice(0, 5);
};

const loadUserProfile = async function(uid) {
  if (!db) return null;
  try {
    const snap = await db.ref('auth/users/' + uid).get();
    return snap.exists() ? snap.val() : null;
  } catch(e) { return null; }
};

const saveUserProfile = async function(uid, profile) {
  if (!db) return;
  try { await db.ref('auth/users/' + uid).set(profile); } catch(e) {}
};

const loadAllUsers = async function() {
  if (!db) return [];
  try {
    const snap = await db.ref('auth/users').get();
    if (!snap.exists()) return [];
    const data = snap.val();
    return Object.entries(data).map(function(entry) {
      return Object.assign({ uid: entry[0] }, entry[1]);
    });
  } catch(e) { return []; }
};

const loadRoles = async function() {
  if (!db) return {};
  try {
    const snap = await db.ref('auth/roles').get();
    return snap.exists() ? snap.val() : {};
  } catch(e) { return {}; }
};

const userHasPerm = function(profile, featureId) {
  if (!profile) return false;
  if (isAdminEmail(profile.email)) return true;
  if (!profile.active) return false;
  const perms = profile.permissions || {};
  return perms[featureId] === true;
};

  const waitingRef = React.useRef(null);
  const pendingRef = React.useRef(null);

  const todayStr = (function() {
    try {
      return new Date(new Date().toLocaleString('en-US',{timeZone:'America/Los_Angeles'})).toISOString().split('T')[0];
    } catch(e) { return new Date().toISOString().split('T')[0]; }
  })();

  // Check if today is Sunday
  const isSunday = (function() {
    try {
      return new Date(todayStr + 'T12:00:00-08:00').getUTCDay() === 0;
    } catch(e) { return false; }
  })();

  // Fetch today's queue data
  const fetchQueue = React.useCallback(async function(useCache) {
    setLoading(true);
    setError(null);
    try {
      // Try cache first if enabled
      if (useCache && typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length) {
        try {
          const db = firebase.database();
          const cacheSnap = await db.ref('auth/todaysQueueCache/' + todayStr).once('value');
          const cached = cacheSnap.val();
          if (cached && cached.fetchedAt) {
            const age = Date.now() - new Date(cached.fetchedAt).getTime();
            if (age < 5 * 60 * 1000) {
              setData(cached);
              setFetchedAt(cached.fetchedAt);
              setLoading(false);
              return;
            }
          }
        } catch(e) { console.error('cache read error:', e); }
      }
      // Fresh fetch
      const resp = await fetch('/.netlify/functions/todays-queue', {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({})
      });
      if (!resp.ok) {
        const t = await resp.text();
        throw new Error('Queue fetch failed: ' + resp.status + ' ' + t.substring(0, 200));
      }
      const fresh = await resp.json();
      setData(fresh);
      setFetchedAt(fresh.fetchedAt);
      // Write cache
      try {
        if (typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length) {
          const db = firebase.database();
          await db.ref('auth/todaysQueueCache/' + todayStr).set(fresh);

// ===== KPI summary preview for collapsed card =====
// Uses real kpiData + getAutoValue + target comparison for goal-based color coding
const KPISummaryPreview = function(props) {
  const deptId = props.deptId;
  const color = props.color;
  const kpiData = props.kpiData || {};
  const targets = props.targets || {};
  const logData = props.logData || {};
  const [period, setPeriod] = React.useState('week');
  const [customStart, setCustomStart] = React.useState('');
  const [customEnd, setCustomEnd] = React.useState('');

  // Date range computation — matches TrackerPage periods
  const rangeDates = React.useMemo(function() {
    const today = new Date();
    const dates = [];
    try {
      if (period === 'today') {
        dates.push(new Date(today));
      } else if (period === 'week') {
        const d = new Date(today);
        const dow = d.getDay();
        const mondayOff = dow === 0 ? 6 : dow - 1;
        d.setDate(d.getDate() - mondayOff);
        for (let i = 0; i <= mondayOff; i++) {
          dates.push(new Date(d.getTime() + i * 86400000));
        }
      } else if (period === 'month') {
        for (let day = 1; day <= today.getDate(); day++) {
          dates.push(new Date(today.getFullYear(), today.getMonth(), day));
        }
      } else if (period === 'quarter') {
        const q = Math.floor(today.getMonth() / 3);
        const first = new Date(today.getFullYear(), q * 3, 1);
        const cur = new Date(first);
        while (cur <= today) { dates.push(new Date(cur)); cur.setDate(cur.getDate() + 1); }
      } else if (period === 'year') {
        const first = new Date(today.getFullYear(), 0, 1);
        const cur = new Date(first);
        while (cur <= today) { dates.push(new Date(cur)); cur.setDate(cur.getDate() + 1); }
      } else if (period === 'custom') {
        if (customStart && customEnd) {
          const s = new Date(customStart + 'T00:00:00');
          const e = new Date(customEnd + 'T00:00:00');
          if (s <= e) {
            const cur = new Date(s);
            while (cur <= e) { dates.push(new Date(cur)); cur.setDate(cur.getDate() + 1); }
          }
        }
      }
    } catch(e) { console.error('range compute error:', e); }
    return dates;
  }, [period, customStart, customEnd]);

  // Pick KPIs to show in preview — top 4-6 per dept from POS + NEG arrays
  const kpiIds = (function() {
    if (deptId === 'inv') return ['eod_sort','correct_bin','recv_err','ghost_inv','unsorted_eod','same_day_log'];
    if (deptId === 'ship') return ['on_time','green_packed','same_day','late_ships','wrong_item','green_missed'];
    if (deptId === 'sales') return ['loc_acc','loc_no_update','wrong_loc','content_gone','items_lost','wrong_pull'];
    return [];
  })();

  // Find KPI metadata from POS/NEG arrays
  const kpiMeta = React.useMemo(function() {
    const allPos = deptId === 'inv' ? (props._INV_POS || []) : deptId === 'ship' ? (props._SHIP_POS || []) : (props._SALES_POS || []);
    const allNeg = deptId === 'inv' ? (props._INV_NEG || []) : deptId === 'ship' ? (props._SHIP_NEG || []) : (props._SALES_NEG || []);
    const combined = allPos.concat(allNeg);
    const map = {};
    combined.forEach(function(k) { map[k.id] = { label: k.label, target: k.target, threshold: k.threshold, isPos: allPos.indexOf(k) > -1 }; });
    return map;
  }, [deptId, props._INV_POS, props._INV_NEG, props._SHIP_POS, props._SHIP_NEG, props._SALES_POS, props._SALES_NEG]);

  // Check if a KPI value meets goal — returns color
  // Compares against target string (e.g., "\u2265 98%", "< 1%", "0 / day")
  // Returns: '#22C55E' (green, met goal), '#F59E0B' (amber, warn), '#EF4444' (red, below), null (no goal/data)
  const evaluateColor = function(kpiId, rawVal, meta) {
    if (!meta || !rawVal || rawVal === '\u2014' || rawVal === null) return null;
    const target = (meta.target || '').toString();
    const threshold = (meta.threshold || '').toString();
    const isPos = meta.isPos;

    // Parse numeric from raw value (strip %, "days", " / ", etc.)
    let numVal = null;
    if (typeof rawVal === 'string') {
      // Match first number including decimals
      const m = rawVal.match(/([\d.]+)/);
      if (m) numVal = parseFloat(m[1]);
      // Y/N days format "3/5 days"
      const ynMatch = rawVal.match(/^(\d+)\/(\d+)\s*days?$/);
      if (ynMatch) {
        const hit = parseInt(ynMatch[1]); const tot = parseInt(ynMatch[2]);
        numVal = tot > 0 ? (hit / tot) * 100 : 0;
      }
    } else if (typeof rawVal === 'number') {
      numVal = rawVal;
    }
    if (numVal === null || isNaN(numVal)) return null;

    // Parse target: "\u2265 98%" → >= 98, "< 1%" → < 1, "0 / day" → 0, "100%" → 100
    const tgtMatch = target.match(/([<>\u2264\u2265]?)\s*([\d.]+)/);
    const thrMatch = threshold.match(/([<>\u2264\u2265]?)\s*([\d.]+)/);
    const tgtNum = tgtMatch ? parseFloat(tgtMatch[2]) : null;
    const thrNum = thrMatch ? parseFloat(thrMatch[2]) : null;

    if (isPos) {
      // Positive KPI: higher is better
      if (tgtNum !== null && numVal >= tgtNum) return '#22C55E'; // met goal
      if (thrNum !== null && numVal < thrNum) return '#EF4444'; // below threshold
      return '#F59E0B'; // amber: between threshold and target
    } else {
      // Negative KPI: lower is better (target is a max)
      if (tgtNum !== null && numVal <= tgtNum) return '#22C55E'; // at or below target
      if (thrNum !== null && numVal > thrNum) return '#EF4444'; // exceeded threshold
      return '#F59E0B'; // amber: between target and threshold
    }
  };

  // Compute values for each KPI
  const rows = kpiIds.map(function(kpiId) {
    const meta = kpiMeta[kpiId];
    if (!meta) return null;

    // Priority: manually entered kpiData > auto-computed from logData
    let rawVal = null;
    try {
      const entry = kpiData[kpiId];
      if (entry && typeof entry === 'object') {
        // Entries keyed by date or "week"
        // For simplicity: pick the most recent value matching the period
        // But the existing tracker uses `period_<key>` style — let's check by range
        const keys = Object.keys(entry);
        for (let i = keys.length - 1; i >= 0; i--) {
          const v = entry[keys[i]];
          if (v !== null && v !== undefined && v !== '') { rawVal = v; break; }
        }
      } else if (entry !== null && entry !== undefined && entry !== '') {
        rawVal = entry;
      }
      // Fall back to auto-value from logData
      if (!rawVal && typeof getAutoValue === 'function') {
        rawVal = getAutoValue(kpiId, logData, rangeDates);
      }
    } catch(e) { console.error('kpi value error:', e); }

    const displayVal = (rawVal === null || rawVal === undefined || rawVal === '') ? '\u2014' : String(rawVal);
    const valColor = evaluateColor(kpiId, rawVal, meta) || (displayVal === '\u2014' ? '#5A6A8A' : '#FFF');
    return { id: kpiId, label: meta.label, val: displayVal, color: valColor };
  }).filter(Boolean);

  const rangeOptions = [
    { id: 'today', label: 'Today' },
    { id: 'week', label: 'WTD' },
    { id: 'month', label: 'MTD' },
    { id: 'quarter', label: 'QTD' },
    { id: 'year', label: 'YTD' },
    { id: 'custom', label: 'Custom' }
  ];

  return React.createElement('div', { style: { padding: '12px 16px' } },
    // Range toggle
    React.createElement('div', { style: { display: 'flex', gap: 4, flexWrap: 'wrap', marginBottom: 10 } },
      rangeOptions.map(function(o) {
        return React.createElement('button', {
          key: o.id,
          onClick: function(e) { e.stopPropagation(); setPeriod(o.id); },
          style: {
            padding: '3px 8px', borderRadius: 12, fontSize: 10, fontWeight: 600,
            border: '1px solid ' + (period === o.id ? color : '#1E2940'),
            background: period === o.id ? color + '22' : 'transparent',
            color: period === o.id ? color : '#8A96B0',
            fontFamily: "'JetBrains Mono',monospace", cursor: 'pointer',
            textTransform: 'uppercase', letterSpacing: 0.3
          }
        }, o.label);
      })
    ),
    period === 'custom' ? React.createElement('div', { style: { display: 'flex', gap: 6, marginBottom: 10 } },
      React.createElement('input', { type: 'date', value: customStart, onClick: function(e){e.stopPropagation();}, onChange: function(e){setCustomStart(e.target.value);}, style: { flex:1, padding:4, fontSize:11, background:'#0F1720', color:'#FFF', border:'1px solid #1E2940', borderRadius:4 } }),
      React.createElement('input', { type: 'date', value: customEnd, onClick: function(e){e.stopPropagation();}, onChange: function(e){setCustomEnd(e.target.value);}, style: { flex:1, padding:4, fontSize:11, background:'#0F1720', color:'#FFF', border:'1px solid #1E2940', borderRadius:4 } })
    ) : null,
    // KPI list — 1-column, scrollable to 160px max
    React.createElement('div', {
      className: 'kpi-preview-list',
      style: { maxHeight: 160, overflowY: 'auto', overflowX: 'hidden', marginBottom: 8, paddingRight: 4 }
    },
      rows.length === 0 ? React.createElement('div', { style: { color: '#5A6A8A', fontSize: 11, padding: 8, textAlign: 'center' } }, 'No KPI data for this range') :
